set-option -g prefix C-a
# set -g mouse on
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on
set -g history-limit 500000

# remap prefix to Control + a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf

# quick pane cycling
unbind ^A
bind ^A select-pane -t :.+

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g status-interval 1

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Enable mouse mode (tmux 2.1 and above)
# set -g mouse on

set -s default-terminal "tmux-256color"
set -s default-terminal "screen-256color"  # !!!
set-option -sa terminal-overrides ",tmux*:Tc"
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -sa terminal-overrides ",alacritty*:Tc"

set -s escape-time 0

set-option -g default-shell "/bin/zsh"
set-option -g default-command 'zsh'

# Set tmux to Vi mode
set-window-option -g mode-keys vi
setw -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'r' send -X rectangle-toggl
set -s escape-time 0

bind '"' split-window -c "#{pane_current_path}"
bind - split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
# bind c new-window -c "#{pane_current_path}"

unbind-key -T prefix D
bind-key -T prefix D detach-client -a

# Bells
set -g monitor-bell on
set -g bell-action any            # or: none | current | other | any
set -g visual-bell off            # set on if you want a flash instead of a bell

# Activity (output in a window while you're not focused on it)
set -g monitor-activity on
set -g activity-action other      # or: none | current | other | any
set -g visual-activity off        # set on if you want a visual alert

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v2.1.3'
# set -g @plugin 'catppuccin/tmux'

# set -g @catppuccin_flavor 'latte'
set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_window_status_style "rounded"
# set -g @catppuccin_window_status_style "none"

set -g @catppuccin_window_number "#I"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_number "#I"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_session_text "#S"
set -g @catppuccin_date_time_text "%Y-%m-%d %T"

# Add indicators to inactive windows
set -g @catppuccin_window_text " #W#{?window_activity_flag, 󰅅,}#{?window_bell_flag, 󰂚,}"
# Add indicators to the current window too (optional)
set -g @catppuccin_window_current_text " #W#{?window_activity_flag, 󰅅,}#{?window_bell_flag, 󰂚,}"

# Load catppuccin
run "~/.tmux/plugins/tmux/catppuccin.tmux"

##### status line content (must be AFTER catppuccin is loaded)
set -g status-left-length 100
set -g status-right-length 100

set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_date_time}#{E:@catppuccin_status_host}"

# set -g @plugin 'tmux-plugins/tmux-sensible'

# Resurrect
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @resurrect-capture-pane-contents 'on'
# set -g @resurrect-strategy-vim 'session'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set -g allow-passthrough on
